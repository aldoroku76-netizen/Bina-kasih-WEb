<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPE SHOP KASIR - Sistem Kasir Modern</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-smoking"></i>
            <h1>VAPE SHOP KASIR</h1>
        </div>
        <div class="info">
            <div class="datetime">
                <div class="jam" id="jam">--:--:--</div>
                <div class="tanggal" id="tanggal">---- ---- --, ----</div>
            </div>
            <div class="sales-today">
                <i class="fas fa-chart-line"></i>
                <div>
                    <div class="label">Penjualan Hari Ini</div>
                    <div class="amount" id="salesToday">Rp 0</div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- SEARCH & FILTER -->
        <div class="search-filter">
            <input type="text" id="searchInput" placeholder="🔍 Cari produk (nama vape, liquid, dll)">
            <select id="kategoriFilter">
                <option value="">Semua Kategori</option>
                <option value="Vape Device">Vape Device</option>
                <option value="Liquid">Liquid</option>
                <option value="Coil">Coil</option>
                <option value="Printilan">Printilan</option>
            </select>
            <button id="refreshBtn" class="btn-refresh">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <!-- PRODUCTS GRID -->
        <div class="products-grid" id="productsGrid">
            <div class="loading">Loading produk...</div>
        </div>
    </div>

    <!-- CART SIDEBAR -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> Keranjang Belanja</h3>
            <button class="close-cart" id="closeCart">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total">
            <div class="subtotal">
                <span>Subtotal:</span>
                <span id="subtotal">Rp 0</span>
            </div>
            <div class="diskon">
                <span>Diskon:</span>
                <span id="diskon">Rp 0</span>
            </div>
            <div class="total">
                <span>Total:</span>
                <span id="total">Rp 0</span>
            </div>
        </div>
        <div class="cart-actions">
            <button class="btn-clear" id="clearCart">Bersihkan</button>
            <button class="btn-checkout" id="checkoutBtn">Bayar <i class="fas fa-credit-card"></i></button>
        </div>
    </div>

    <!-- PAYMENT MODAL -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Konfirmasi Pembayaran</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="total-display">
                    <h4>Total: <span id="modalTotal">Rp 0</span></h4>
                </div>
                <div class="payment-method">
                    <label><input type="radio" name="payment" value="tunai" checked> Tunai</label>
                    <label><input type="radio" name="payment" value="qris"> QRIS</label>
                    <label><input type="radio" name="payment" value="transfer"> Transfer</label>
                </div>
                <div class="bayar-section" id="bayarSection" style="display:none;">
                    <label>Jumlah Bayar:</label>
                    <input type="number" id="jumlahBayar" min="0" step="1000">
                    <div class="kembali" id="kembali">Kembali: Rp 0</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelPayment">Batal</button>
                <button class="btn-confirm" id="confirmPayment">Proses Pembayaran</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
